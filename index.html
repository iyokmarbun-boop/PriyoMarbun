<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Edukasi Keamanan Cyber</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menggunakan Font Awesome untuk icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Menggunakan font Google 'Inter' -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-glass">
            <div class="profile-icon">
                <i class="fa-solid fa-user"></i>
            </div>
            
            <form action="#" method="POST" autocomplete="off">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email ID" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <div class="options-group">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                
                <button type="submit" class="login-btn">LOGIN</button>
            </form>
        </div>
    </div>

    <!-- Footer Peringatan Simulasi Edukasi Keamanan Cyber -->
    <footer class="security-warning">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>Halaman ini adalah simulasi edukasi keamanaan cyber, perhatikan URL sebelum memasukan data sensitive</span>
    </footer>
</body>
</html>
